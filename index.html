<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 多益全真閱讀模擬考場 v3.14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: auto; height: 300px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f5f5f4; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .reading-content { line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        .passage-box { background-color: #ffffff; border: 1px solid #e7e5e4; border-radius: 1.5rem; padding: 2.5rem; margin-bottom: 1.5rem; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .q-map-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .ans-dot { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border-radius: 10px; cursor: pointer; border: 2px solid #f3f4f6; transition: all 0.2s; }
        .ans-dot.not-answered { background-color: #ffffff; color: #d1d5db; }
        .ans-dot.answered { background-color: #0d9488 !important; color: #ffffff !important; border-color: #0d9488 !important; }
        .ans-dot.current { border-color: #3b82f6 !important; border-width: 3px !important; transform: scale(1.05); }
        .success-toast { animation: slideUp 0.3s ease-out; position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); }
        @keyframes slideUp { from { transform: translateY(100%) translateX(-50%); opacity: 0; } to { transform: translateY(0) translateX(-50%); opacity: 1; } }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased">
<div id="app" class="min-h-screen flex flex-col">
    <nav id="navbar" class="bg-white border-b border-stone-200 sticky top-0 z-50 px-6 py-4 shadow-sm hidden">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <span id="timer-display" class="text-xl font-mono font-bold text-teal-800 bg-teal-50 px-3 py-1 rounded border border-teal-100">20:00</span>
                <div class="hidden md:flex gap-2" id="nav-parts">
                    <button onclick="jumpToPart(5)" class="px-4 py-1 text-xs font-bold border border-stone-200 rounded-full hover:bg-stone-100">Part 5</button>
                    <button onclick="jumpToPart(6)" class="px-4 py-1 text-xs font-bold border border-stone-200 rounded-full hover:bg-stone-100">Part 6</button>
                    <button onclick="jumpToPart(7)" class="px-4 py-1 text-xs font-bold border border-stone-200 rounded-full hover:bg-stone-100">Part 7</button>
                </div>
                <span id="review-tag" class="hidden px-4 py-1 bg-amber-50 text-amber-700 text-xs font-black rounded-full border border-amber-100 uppercase tracking-widest">Review Mode</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-right hidden sm:block">
                    <div class="text-[10px] text-stone-400 font-black uppercase">Progress</div>
                    <div class="text-sm font-bold text-teal-700"><span id="ans-count">0</span> / <span id="total-count">0</span></div>
                </div>
                <button id="finish-btn" onclick="confirmFinish()" class="bg-amber-700 text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-amber-800 shadow-md">結束並交卷</button>
            </div>
        </div>
    </nav>
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <section id="welcome-screen" class="max-w-6xl w-full bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-16 text-center border border-stone-100 fade-in">
            <div id="welcome-content">
                <div class="text-6xl mb-6">🎯</div>
                <h1 class="text-4xl font-black text-stone-900 mb-2 tracking-tight">TOEIC 智慧 YAML 考場</h1>
                <p class="text-stone-500 mb-12 text-lg">智慧辨識自癒引擎 v3.14 (20 分鐘精練版)</p>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 text-left">
                    <div class="p-8 bg-teal-50/50 rounded-[2rem] border-2 border-teal-100 flex flex-col justify-between">
                        <div><h3 class="font-black text-teal-900 mb-2 uppercase text-sm">本地題庫載入</h3><p class="text-xs text-teal-700/80 mb-6">選取電腦中的 YAML 檔案。</p></div>
                        <button onclick="document.getElementById('q-file').click()" class="w-full py-4 bg-teal-700 text-white rounded-2xl font-bold">選取檔案</button>
                        <input type="file" id="q-file" accept=".yaml,.yml" class="hidden" onchange="handleFile(this, 'test')">
                    </div>
                    <div class="p-8 bg-sky-50/50 rounded-[2rem] border-2 border-sky-100 flex flex-col justify-between">
                        <div><h3 class="font-black text-sky-900 mb-2 uppercase text-sm">雲端網址快充</h3><p class="text-xs text-sky-700/80 mb-4">貼上 GitHub Raw 網址。</p></div>
                        <input type="text" id="cloud-url-input" class="w-full px-4 py-3 border border-sky-200 rounded-xl text-xs mb-3" placeholder="https://...">
                        <button onclick="loadFromInputUrl()" class="w-full py-4 bg-sky-700 text-white rounded-2xl font-bold">載入雲端</button>
                    </div>
                    <div class="p-8 bg-stone-50 rounded-[2rem] border-2 border-stone-200 flex flex-col justify-between">
                        <div><h3 class="font-black text-stone-900 mb-2 uppercase text-sm">匯入成績</h3><p class="text-xs text-stone-500 mb-6">載入 YAML 成績單複習筆記。</p></div>
                        <button onclick="document.getElementById('r-file').click()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold">匯入報告</button>
                        <input type="file" id="r-file" accept=".yaml,.yml" class="hidden" onchange="handleFile(this, 'review')">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                    <div class="p-6 bg-stone-50 rounded-2xl flex items-center justify-between"><div class="text-left"><span class="text-xs text-stone-400 font-bold uppercase block">時間</span><span class="text-2xl font-black">20:00</span></div><span>⏱️</span></div>
                    <div class="p-6 bg-stone-50 rounded-2xl flex items-center justify-between"><div class="text-left"><span class="text-xs text-stone-400 font-bold uppercase block">總題數</span><span class="text-2xl font-black" id="welcome-total">25 題</span></div><span>📝</span></div>
                </div>
                <p id="auto-load-hint" class="mt-8 text-xs text-stone-300">偵測中...</p>
                <div id="loading-indicator" class="hidden"><div class="spinner"></div></div>
            </div>
        </section>
        <section id="quiz-engine" class="hidden w-full max-w-7xl flex flex-col md:flex-row gap-6 h-[85vh] fade-in">
            <div class="w-full md:w-3/5 bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col">
                <div class="p-4 border-b border-stone-50 bg-stone-50 flex justify-between items-center"><span class="font-black text-stone-400 text-xs uppercase">Passage</span><span id="q-badge" class="px-4 py-1 bg-stone-900 text-white text-xs font-bold rounded-full">Q --</span></div>
                <div id="passage-display" class="flex-grow p-10 md:p-14 overflow-y-auto custom-scrollbar"></div>
            </div>
            <div class="w-full md:w-2/5 flex flex-col gap-4">
                <div class="bg-white rounded-3xl border border-stone-200 p-10 flex-grow flex flex-col">
                    <span id="q-part-label" class="text-[10px] font-black uppercase text-amber-700 tracking-widest">Part --</span>
                    <div id="options-list" class="space-y-4 mt-8 flex-grow overflow-y-auto pr-2"></div>
                    <div class="mt-8 flex gap-3">
                        <button onclick="navigate(-1)" class="flex-1 py-4 border border-stone-200 rounded-2xl font-bold text-stone-400">上一題</button>
                        <button onclick="navigate(1)" id="next-btn" class="flex-1 py-4 bg-stone-900 text-white rounded-2xl font-bold">下一題</button>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border border-stone-200 p-6 flex flex-col"><div class="q-map-grid overflow-y-auto max-h-48" id="q-map"></div></div>
            </div>
        </section>
        <section id="analysis-dashboard" class="hidden w-full max-w-6xl space-y-8 fade-in pb-24">
            <div class="bg-white rounded-[3rem] shadow-2xl p-10 md:p-20 text-center border border-stone-100">
                <div class="flex justify-between items-center mb-16"><button onclick="window.location.reload()" class="px-8 py-3 bg-stone-100 text-stone-500 rounded-full text-xs font-black uppercase">← Home</button><h2 class="text-4xl font-black">正式分析報告</h2><div class="w-24"></div></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center mb-20">
                    <div class="chart-container"><canvas id="radarChart"></canvas></div>
                    <div class="text-left space-y-8">
                        <div class="p-12 bg-stone-900 text-white rounded-[2.5rem] text-center">
                            <div class="text-xs text-stone-500 font-bold mb-2 uppercase opacity-80">Estimated Score</div>
                            <div id="res-score" class="text-8xl font-black tracking-tighter">--</div>
                            <div class="mt-8 text-teal-400 font-black text-sm uppercase">⏱️ Time: <span id="res-time">--</span></div>
                        </div>
                        <div id="res-parts" class="grid grid-cols-3 gap-4"></div>
                        <button onclick="exportResult()" class="w-full py-6 bg-teal-700 text-white font-black rounded-3xl shadow-xl">💾 下載 YAML 錯題筆記</button>
                    </div>
                </div>
                <div class="text-left border-t border-stone-100 pt-20">
                    <div class="flex flex-col lg:flex-row gap-8 items-start">
                        <div id="review-list" class="w-full lg:w-2/3 space-y-16"></div>
                        <div class="w-full lg:w-1/3 lg:sticky lg:top-24 bg-white p-8 rounded-[2rem] border border-stone-200 shadow-sm flex flex-col">
                            <h4 class="text-xl font-black mb-3">📓 筆記本</h4>
                            <textarea id="notebook" class="w-full h-[450px] p-5 border border-stone-200 rounded-2xl outline-none resize-none text-sm leading-relaxed" placeholder="💡 寫下您的單字或片語..."></textarea>
                        </div>
                    </div>
                </div>
                <button onclick="window.location.reload()" class="mt-24 px-20 py-8 bg-stone-900 text-white font-black rounded-full shadow-2xl uppercase tracking-[0.2em]">Restart</button>
            </div>
        </section>
    </main>
    <div id="alert-modal" class="hidden fixed inset-0 bg-stone-950/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] max-w-md w-full p-8 text-center shadow-2xl border border-stone-100">
            <div class="text-4xl mb-4">⚠️</div><h3 id="alert-title" class="text-xl font-black mb-2"></h3><p id="alert-message" class="text-stone-500 text-sm mb-6"></p>
            <button onclick="closeAlertModal()" class="w-full py-3 bg-stone-900 text-white rounded-xl font-bold">確認</button>
        </div>
    </div>
    <div id="confirm-modal" class="hidden fixed inset-0 bg-stone-950/40 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] max-w-md w-full p-8 text-center shadow-2xl border border-stone-100">
            <div class="text-4xl mb-4">❓</div><h3 id="confirm-title" class="text-xl font-black mb-2"></h3><p id="confirm-message" class="text-stone-500 text-sm mb-6"></p>
            <div class="flex gap-3"><button onclick="closeConfirmModal(false)" class="flex-1 py-3 bg-stone-100 rounded-xl font-bold">取消</button><button id="confirm-yes-btn" class="flex-1 py-3 bg-teal-700 text-white rounded-xl font-bold">確認</button></div>
        </div>
    </div>
    <div id="toast" class="hidden px-10 py-5 bg-stone-900 text-white rounded-full shadow-2xl z-[100] success-toast font-bold">✅ 操作成功！</div>
</div>

<script>
    let quizData = [], userAnswers = [], currentIdx = 0, timerInterval, startTime, timeStr = "", isReview = false, dataSourceName = "quiz_data";
    const dom = {
        welcome: document.getElementById('welcome-screen'), engine: document.getElementById('quiz-engine'),
        dashboard: document.getElementById('analysis-dashboard'), navbar: document.getElementById('navbar'),
        qMap: document.getElementById('q-map'), reviewList: document.getElementById('review-list'),
        toast: document.getElementById('toast'), ansCount: document.getElementById('ans-count'),
        totalCount: document.getElementById('total-count'), notebook: document.getElementById('notebook'),
        cloudInput: document.getElementById('cloud-url-input'), timerDisplay: document.getElementById('timer-display')
    };

    function showAlert(title, message) { document.getElementById('alert-title').innerText = title; document.getElementById('alert-message').innerText = message; document.getElementById('alert-modal').classList.remove('hidden'); }
    function closeAlertModal() { document.getElementById('alert-modal').classList.add('hidden'); }
    let confirmResolve = null;
    function showConfirm(title, message) {
        document.getElementById('confirm-title').innerText = title; document.getElementById('confirm-message').innerText = message;
        document.getElementById('confirm-modal').classList.remove('hidden');
        return new Promise((r) => { confirmResolve = r; });
    }
    function closeConfirmModal(res) { document.getElementById('confirm-modal').classList.add('hidden'); if(confirmResolve) { confirmResolve(res); confirmResolve = null; } }
    document.getElementById('confirm-yes-btn').onclick = () => closeConfirmModal(true);

    function sanitizeYamlContent(content) {
        if (!content) return "";
        return content.split(/\r?\n/).filter(line => !line.trim().startsWith('```')).join('\n').trim();
    }

    function handleFile(input, mode) {
        const file = input.files[0]; if (!file) return;
        dataSourceName = file.name.replace(/\.[^/.]+$/, "");
        const reader = new FileReader(); reader.onload = (e) => loadRawData(e.target.result, mode); reader.readAsText(file);
    }

    async function loadFromInputUrl() {
        const url = dom.cloudInput.value.trim(); if (!url) return showAlert('空白','請輸入網址');
        try {
            const res = await fetch(url);
            if (res.ok) {
                const text = await res.text(); quizData = jsyaml.load(sanitizeYamlContent(text));
                dataSourceName = url.split('/').pop().split('?')[0] || "remote";
                localStorage.setItem('toeic_last_cloud_url', url); startExam();
            } else showAlert('錯誤','載入失敗');
        } catch (e) { showAlert('失敗','CORS 限制或連線問題'); }
    }

    function loadRawData(content, mode) {
        try {
            const data = jsyaml.load(sanitizeYamlContent(content));
            if (mode === 'test') { quizData = data; isReview = false; startExam(); }
            else { quizData = data.quizData; userAnswers = data.userAnswers; dom.notebook.value = data.notes || ""; isReview = true; showDashboard(); }
        } catch (e) { showAlert('錯誤','解析失敗'); }
    }

    function startExam() {
        userAnswers = Array(quizData.length).fill(null); dom.totalCount.innerText = quizData.length;
        dom.welcome.classList.add('hidden'); dom.engine.classList.remove('hidden'); dom.navbar.classList.remove('hidden');
        startTime = Date.now(); let s = 20 * 60; // ⏱️ 20分鐘
        timerInterval = setInterval(() => {
            s--; dom.timerDisplay.innerText = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
            if(s<=0) finishExam();
        }, 1000); renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('q-badge').innerText = `Q${currentIdx + 1}`;
        document.getElementById('q-part-label').innerText = `Part ${q.part}`;
        const pArea = document.getElementById('passage-display');
        if (q.part === 5) pArea.innerHTML = `<div class="flex items-center justify-center h-full"><div class="text-3xl font-black text-center p-12 bg-white rounded-3xl border-4 border-teal-50">${q.question.replace(/_______|_____/g, '<span class="text-teal-700 underline">?</span>')}</div></div>`;
        else pArea.innerHTML = `<div class="passage-box"><div class="reading-content text-stone-700">${q.passage}</div></div><div class="p-8 bg-white rounded-3xl border-l-[12px] border-teal-700 shadow-md text-xl font-black">${q.question}</div>`;
        const oArea = document.getElementById('options-list'); oArea.innerHTML = '';
        q.options.forEach((opt, i) => {
            const isSelected = userAnswers[currentIdx] === i;
            const btn = document.createElement('button');
            btn.className = `w-full text-left p-5 rounded-2xl border-2 transition-all flex items-center ${isSelected ? 'border-teal-700 bg-teal-50' : 'border-stone-100 bg-white'}`;
            btn.innerHTML = `<span class="w-10 h-10 rounded-lg flex items-center justify-center mr-4 font-black ${isSelected ? 'bg-teal-700 text-white' : 'bg-stone-100'}">${String.fromCharCode(65+i)}</span><span class="font-bold">${opt}</span>`;
            if(!isReview) btn.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); renderMap(); dom.ansCount.innerText = userAnswers.filter(a => a!==null).length; };
            oArea.appendChild(btn);
        });
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? (isReview ? "返回分析" : "結束交卷") : "下一題";
        renderMap();
    }

    function renderMap() {
        dom.qMap.innerHTML = '';
        quizData.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `ans-dot ${userAnswers[i] !== null ? 'answered' : 'not-answered'} ${i === currentIdx ? 'current' : ''}`;
            dot.innerText = i + 1; dot.onclick = () => { currentIdx = i; renderQuestion(); };
            dom.qMap.appendChild(dot);
        });
    }

    function navigate(step) { if(currentIdx+step >= 0 && currentIdx+step < quizData.length) { currentIdx+=step; renderQuestion(); } else if(currentIdx === quizData.length-1 && step === 1) { if(isReview) showDashboard(); else confirmFinish(); } }
    function jumpToPart(p) { const i = quizData.findIndex(q => q.part === p); if(i !== -1) { currentIdx = i; renderQuestion(); } }
    async function confirmFinish() { const yes = await showConfirm('結束測驗','確定交卷嗎？'); if(yes) finishExam(); }
    function finishExam() { clearInterval(timerInterval); const elapsed = Math.floor((Date.now()-startTime)/1000); timeStr = `${Math.floor(elapsed/60)}分${elapsed%60}秒`; showDashboard(); }

    function showDashboard() {
        dom.welcome.classList.add('hidden'); dom.engine.classList.add('hidden'); dom.navbar.classList.remove('hidden'); dom.dashboard.classList.remove('hidden');
        const stats = [5,6,7].map(p => {
            const qs = quizData.filter(q => q.part === p);
            const correct = qs.filter(q => userAnswers[quizData.indexOf(q)] === q.answer).length;
            return { part: p, correct, total: qs.length, rate: qs.length > 0 ? Math.round(correct/qs.length*100) : 0 };
        });
        document.getElementById('res-score').innerText = Math.round((stats.reduce((a,b)=>a+b.correct,0)/quizData.length)*495/5)*5;
        document.getElementById('res-time').innerText = timeStr;
        document.getElementById('res-parts').innerHTML = stats.map(s => `<div class="p-4 bg-white rounded-xl border border-stone-100 text-center shadow-sm"><div class="text-[10px] font-black text-stone-400">Part ${s.part}</div><div class="text-xl font-black">${s.rate}%</div></div>`).join('');
        initChart(stats); renderReview('all');
    }

    function renderReview(filter) {
        dom.reviewList.innerHTML = '';
        quizData.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.answer; if(filter === 'wrong' && isCorrect) return;
            const card = document.createElement('div'); card.className = `p-10 rounded-[2.5rem] border-2 shadow-sm ${isCorrect ? 'bg-white' : 'bg-red-50/20 border-red-200'}`;
            const options = q.options.map((opt, idx) => {
                const isAns = idx === q.answer, isMine = idx === userAnswers[i];
                let cls = "p-4 rounded-xl border-2 mb-2 flex items-center ";
                if(isAns) cls += "bg-teal-50 border-teal-500 font-bold"; else if(isMine) cls += "bg-red-50 border-red-400"; else cls += "opacity-50";
                return `<div class="${cls}"><span class="mr-3">${String.fromCharCode(65+idx)}</span>${opt} ${isAns ? '✓' : isMine ? '✗' : ''}</div>`;
            }).join('');
            card.innerHTML = `<div class="mb-4 text-xs font-black uppercase text-stone-400">Q${i+1} · Part ${q.part}</div><div class="mb-6 italic text-stone-600 text-sm">${q.passage || ''}</div><div class="text-xl font-black mb-6">${q.question}</div>${options}<div class="mt-6 p-4 bg-stone-50 rounded-xl text-sm">${q.explanation}</div>`;
            dom.reviewList.appendChild(card);
        });
    }

    function initChart(stats) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (window.r) window.r.destroy();
        window.r = new Chart(ctx, { type: 'radar', data: { labels: ['Part 5', 'Part 6', 'Part 7'], datasets: [{ data: stats.map(s => s.rate), backgroundColor: 'rgba(13,148,136,0.1)', borderColor: '#0d9488', borderWidth: 4 }] }, options: { plugins: { legend: { display: false } }, scales: { r: { suggestedMax: 100 } } } });
    }

    function exportResult() {
        const out = { quizData, userAnswers, timeTaken: timeStr, notes: dom.notebook.value, exportedAt: new Date().toLocaleString() };
        const blob = new Blob([jsyaml.dump(out)], { type: "text/yaml" });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `report_${dataSourceName}.yaml`; a.click();
        document.getElementById('toast').classList.remove('hidden'); setTimeout(()=>document.getElementById('toast').classList.add('hidden'), 3000);
    }

    window.onload = async () => {
        const savedUrl = localStorage.getItem('toeic_last_cloud_url'); if (savedUrl) dom.cloudInput.value = savedUrl;
        const params = new URLSearchParams(window.location.search), remoteUrl = params.get('data');
        if (remoteUrl) {
            try {
                const res = await fetch(remoteUrl);
                if (res.ok) { quizData = jsyaml.load(sanitizeYamlContent(await res.text())); dataSourceName = remoteUrl.split('/').pop(); startExam(); return; }
            } catch (e) { showAlert('提示','URL 載入受阻'); }
        }
        try {
            const res = await fetch('./quiz_data.yaml');
            if (res.ok) { quizData = jsyaml.load(sanitizeYamlContent(await res.text())); document.getElementById('auto-load-hint').innerText = "✓ 偵測到本地 quiz_data.yaml"; }
        } catch(e) {}
        dom.welcome.classList.remove('hidden');
    };
</script>
</body>
</html>
